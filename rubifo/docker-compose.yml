version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rubifo_db
    environment:
      POSTGRES_USER: rubfo
      POSTGRES_PASSWORD: rubfo_dev_password
      POSTGRES_DB: rubifo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rubfo"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: rubifo_bot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rubfo:rubfo_dev_password@postgres:5432/rubifo
      BOT_TOKEN: ${BOT_TOKEN}
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./logs:/var/log/rubifo
    restart: unless-stopped

volumes:
  postgres_data:
