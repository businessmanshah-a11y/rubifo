<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روبیفو — فعالیت & Errors</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ── Tabs ── */
        .tabs { display: flex; gap: 2px; margin-bottom: 24px; background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: 4px; width: fit-content; }
        .tab-btn { padding: 7px 18px; border: none; border-radius: var(--r); background: transparent; color: var(--text-3); cursor: pointer; font-size: var(--f-sm); font-family: var(--font); font-weight: 500; transition: background 140ms ease, color 140ms ease; }
        .tab-btn.active { background: var(--surface-3); color: var(--text); font-weight: 600; }
        .tab-btn:hover:not(.active) { color: var(--text-2); }

        /* ── Filters bar ── */
        .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: var(--f-xs); color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
        .filter-group input, .filter-group select { min-width: 150px; }

        /* ── Auto-refresh toggle ── */
        .refresh-bar { display: flex; align-items: center; gap: 10px; margin-left: auto; }
        .toggle { position: relative; width: 36px; height: 20px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background: var(--surface-3); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; transition: background .25s; }
        .slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px; background: var(--text-3); border-radius: 50%; transition: transform .25s, background .25s; }
        input:checked + .slider { background: var(--accent-subtle); border-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); background: var(--accent); }

        /* ── Log Feed ── */
        .log-feed { display: flex; flex-direction: column; gap: 2px; }

        .log-entry {
            display: grid;
            grid-template-columns: 100px 140px 160px 1fr;
            gap: 0;
            font-size: var(--f-sm);
            border-radius: var(--r);
            overflow: hidden;
            transition: background 100ms ease;
        }
        .log-entry:hover { background: var(--surface-2); }

        .log-entry > * {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-soft);
        }

        .log-time  { color: var(--text-3); font-family: var(--font-mono); font-size: var(--f-xs); line-height: 1.5; }
        .log-uid   { color: var(--text-3); font-family: var(--font-mono); font-size: var(--f-xs); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-action { font-family: var(--font-mono); font-size: var(--f-xs); color: var(--accent); font-weight: 500; display: flex; align-items: flex-start; gap: 6px; flex-wrap: wrap; }
        .log-msg   { color: var(--text-2); line-height: 1.5; word-break: break-word; }

        /* Error / warning highlight */
        .log-entry.is-error { border-left: 2px solid var(--err-fg); }
        .log-entry.is-error .log-msg { color: var(--err-fg); }
        .log-entry.is-warning { border-left: 2px solid var(--warn-fg); }
        .log-entry.is-warning .log-msg { color: var(--warn-fg); }

        /* Level badges */
        .lvl { display: inline-block; padding: 1px 7px; border-radius: 100px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; border: 1px solid transparent; }
        .lvl-info    { background: var(--inf-bg);  color: var(--inf-fg);  border-color: var(--inf-bd); }
        .lvl-warning { background: var(--warn-bg); color: var(--warn-fg); border-color: var(--warn-bd); }
        .lvl-error   { background: var(--err-bg);  color: var(--err-fg);  border-color: var(--err-bd); }
        .lvl-debug   { background: var(--surface-3); color: var(--text-3); border-color: var(--border); }

        /* ── User chips ── */
        .user-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .user-chip {
            background: var(--surface-2);
            border: 1px solid var(--border-soft);
            border-radius: 100px;
            padding: 3px 12px;
            font-size: var(--f-xs);
            color: var(--text-3);
            cursor: pointer;
            font-family: var(--font-mono);
            transition: all .15s ease;
        }
        .user-chip:hover { border-color: var(--border); color: var(--text-2); }
        .user-chip.active { background: var(--accent-subtle); color: var(--accent); border-color: var(--accent); }
        .user-chip .cnt { opacity: .6; margin-left: 4px; }

        /* ── Section label ── */
        .section-label {
            font-size: var(--f-xs);
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: .08em;
            padding: 14px 0 8px;
            border-bottom: 1px solid var(--border-soft);
            margin-bottom: 8px;
        }

        /* ── Empty state ── */
        .empty-state { text-align: center; padding: 48px; color: var(--text-3); }
        .empty-state .icon { font-size: 32px; margin-bottom: 10px; }
        .empty-state p { font-size: var(--f-sm); }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo"><h2>روبیفو</h2><p>پنل مدیریت</p></div>
            <ul class="nav-menu">
                <li><a href="/admin/dashboard.html">داشبورد</a></li>
                <li><a href="/admin/users.html">کاربران</a></li>
                <li><a href="/admin/activity.html" class="active">فعالیت و خطاها</a></li>
                <li><a href="/admin/channels.html">کانال‌ها</a></li>
                <li><a href="/admin/logs.html">لاگ‌ها</a></li>
                <li><a href="/admin/performance.html">عملکرد</a></li>
                <li><a href="/admin/settings.html">تنظیمات</a></li>
            </ul>
            <div class="user-info">
                <p id="currentUser">—</p>
                <button id="logoutBtn" class="btn btn-small btn-danger">خروج</button>
            </div>
        </nav>

        <main class="content">
            <div class="header">
                <h1>فعالیت و خطاها</h1>
                <div class="refresh-bar">
                    <span style="font-size:var(--f-xs);color:var(--text-3);">auto-refresh</span>
                    <label class="toggle">
                        <input type="checkbox" id="autoRefreshToggle" checked>
                        <span class="slider"></span>
                    </label>
                    <button class="btn btn-secondary btn-small" onclick="loadData()">↻</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('activity', this)">رفتار کاربران</button>
                <button class="tab-btn" onclick="switchTab('errors', this)">خطاها و هشدارها</button>
            </div>

            <!-- ── Activity Tab ── -->
            <div id="tab-activity">
                <div id="userChips" class="user-chips"></div>

                <div class="filters">
                    <div class="filter-group">
                        <label>کاربر</label>
                        <input type="text" id="actUserFilter" placeholder="user id…" oninput="debouncedLoad()">
                    </div>
                    <div class="filter-group">
                        <label>Action</label>
                        <input type="text" id="actActionFilter" placeholder="/start, /buy…" oninput="debouncedLoad()">
                    </div>
                    <div class="filter-group">
                        <label>سطح</label>
                        <select id="actLevelFilter" onchange="loadActivity()">
                            <option value="">همه</option>
                            <option value="info">Info</option>
                            <option value="warning">Warning</option>
                            <option value="error">Error</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary btn-small" style="align-self:flex-end" onclick="clearActivityFilters()">پاک</button>
                </div>

                <div class="log-feed" id="activityFeed">
                    <div class="empty-state"><div class="icon">⏳</div><p>در حال بارگذاری…</p></div>
                </div>

                <div class="pagination" style="margin-top:16px;">
                    <button class="btn btn-secondary btn-small" onclick="actPrevPage()">← قبلی</button>
                    <span id="actPageInfo">صفحه ۱</span>
                    <button class="btn btn-secondary btn-small" onclick="actNextPage()">بعدی →</button>
                </div>
            </div>

            <!-- ── Errors Tab ── -->
            <div id="tab-errors" style="display:none;">
                <div class="filters">
                    <div class="filter-group">
                        <label>کاربر</label>
                        <input type="text" id="errUserFilter" placeholder="user id…" oninput="debouncedLoadErr()">
                    </div>
                    <button class="btn btn-secondary btn-small" style="align-self:flex-end" onclick="clearErrorFilters()">پاک</button>
                </div>

                <div class="section-label">خطاها</div>
                <div class="log-feed" id="errorFeed">
                    <div class="empty-state"><div class="icon">⏳</div><p>در حال بارگذاری…</p></div>
                </div>

                <div class="section-label" style="margin-top:24px;">هشدارها</div>
                <div class="log-feed" id="warningFeed">
                    <div class="empty-state"><div class="icon">⏳</div><p>در حال بارگذاری…</p></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/admin/login.html';

        let activeTab = 'activity';
        let actPage   = 1;
        const PAGE_SIZE = 50;
        let refreshInterval = null;
        let debounceTimer   = null;

        async function fetchAPI(endpoint, options = {}) {
            const res = await fetch(endpoint, {
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                ...options,
            });
            if (res.status === 401) { localStorage.removeItem('token'); window.location.href = '/admin/login.html'; }
            return res.json();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-activity').style.display = tab === 'activity' ? '' : 'none';
            document.getElementById('tab-errors').style.display   = tab === 'errors'   ? '' : 'none';
            activeTab = tab;
            loadData();
        }

        function debouncedLoad()    { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadActivity, 350); }
        function debouncedLoadErr() { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadErrors, 350); }

        function loadData() {
            if (activeTab === 'activity') { loadActivity(); loadUserChips(); }
            else                          { loadErrors(); }
        }

        function levelBadge(level) {
            const cls = { info: 'lvl-info', warning: 'lvl-warning', error: 'lvl-error', debug: 'lvl-debug' }[level] || 'lvl-debug';
            return `<span class="lvl ${cls}">${level}</span>`;
        }

        function fmtTime(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('fa-IR-u-ca-persian') + '<br>' +
                   d.toLocaleTimeString('fa-IR-u-ca-persian', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        }

        function renderEntry(log, extraClass = '') {
            return `
                <div class="log-entry ${extraClass}">
                    <div class="log-time">${fmtTime(log.created_at)}</div>
                    <div class="log-uid">${esc(log.user_id || '—')}</div>
                    <div class="log-action">${esc(log.action || '')} ${levelBadge(log.level)}</div>
                    <div class="log-msg">${esc(log.message || '')}</div>
                </div>`;
        }

        function esc(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        async function loadActivity() {
            const userFilter   = document.getElementById('actUserFilter').value.trim();
            const actionFilter = document.getElementById('actActionFilter').value.trim();
            const levelFilter  = document.getElementById('actLevelFilter').value;

            let url = `/admin/activity?limit=${PAGE_SIZE}&offset=${(actPage - 1) * PAGE_SIZE}`;
            if (userFilter)   url += `&user_id=${encodeURIComponent(userFilter)}`;
            if (actionFilter) url += `&action=${encodeURIComponent(actionFilter)}`;
            if (levelFilter)  url += `&level=${encodeURIComponent(levelFilter)}`;

            const feed = document.getElementById('activityFeed');
            try {
                const data = await fetchAPI(url);
                const logs = data.logs || [];
                if (logs.length === 0) {
                    feed.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>فعالیتی یافت نشد</p></div>';
                } else {
                    feed.innerHTML = logs.map(l => {
                        const cls = l.level === 'error' ? 'is-error' : l.level === 'warning' ? 'is-warning' : '';
                        return renderEntry(l, cls);
                    }).join('');
                }
                document.getElementById('actPageInfo').textContent =
                    `صفحه ${actPage}  ·  ${data.total ?? logs.length} رویداد`;
            } catch (e) {
                feed.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
            }
        }

        async function loadUserChips() {
            try {
                const data = await fetchAPI('/admin/activity/users?limit=20');
                const chips = document.getElementById('userChips');
                if (!data.users || data.users.length === 0) { chips.innerHTML = ''; return; }
                chips.innerHTML = data.users.map(u => `
                    <span class="user-chip" onclick="filterByUser('${u.user_id}')">
                        ${u.user_id}<span class="cnt">${u.event_count ?? u.count ?? ''}</span>
                    </span>`).join('');
            } catch (_) {}
        }

        function filterByUser(uid) {
            document.getElementById('actUserFilter').value = uid;
            document.querySelectorAll('.user-chip').forEach(c => {
                c.classList.toggle('active', c.textContent.trim().startsWith(uid));
            });
            actPage = 1;
            loadActivity();
        }

        function clearActivityFilters() {
            document.getElementById('actUserFilter').value   = '';
            document.getElementById('actActionFilter').value = '';
            document.getElementById('actLevelFilter').value  = '';
            document.querySelectorAll('.user-chip').forEach(c => c.classList.remove('active'));
            actPage = 1;
            loadActivity();
        }

        function actPrevPage() { if (actPage > 1) { actPage--; loadActivity(); } }
        function actNextPage() { actPage++; loadActivity(); }

        async function loadErrors() {
            const userFilter = document.getElementById('errUserFilter').value.trim();

            for (const [level, feedId, emptyIcon] of [['error','errorFeed','✅'],['warning','warningFeed','👍']]) {
                let url = `/admin/activity?limit=100&offset=0&level=${level}`;
                if (userFilter) url += `&user_id=${encodeURIComponent(userFilter)}`;
                const feed = document.getElementById(feedId);
                try {
                    const data = await fetchAPI(url);
                    const logs = data.logs || [];
                    if (logs.length === 0) {
                        feed.innerHTML = `<div class="empty-state"><div class="icon">${emptyIcon}</div><p>${level === 'error' ? 'خطایی نیست' : 'هشداری نیست'}</p></div>`;
                    } else {
                        const cls = level === 'error' ? 'is-error' : 'is-warning';
                        feed.innerHTML = logs.map(l => renderEntry(l, cls)).join('');
                    }
                } catch {
                    feed.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>خطا در بارگذاری</p></div>';
                }
            }
        }

        function clearErrorFilters() {
            document.getElementById('errUserFilter').value = '';
            loadErrors();
        }

        function setupAutoRefresh() {
            const toggle = document.getElementById('autoRefreshToggle');
            function apply() {
                clearInterval(refreshInterval);
                if (toggle.checked) refreshInterval = setInterval(loadData, 30000);
            }
            toggle.addEventListener('change', apply);
            apply();
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/admin/login.html';
        });

        const payload = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('currentUser').textContent = payload.sub || 'Admin';
        loadData();
        loadUserChips();
        setupAutoRefresh();
    </script>
</body>
</html>
