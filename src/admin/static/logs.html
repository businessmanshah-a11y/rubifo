<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روبیفو — لاگ‌ها</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .logs-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .filter-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-row select,
        .filter-row input { min-width: 140px; }

        .log-msg-cell {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-2);
            font-size: var(--f-xs);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo"><h2>روبیفو</h2><p>پنل مدیریت</p></div>
            <ul class="nav-menu">
                <li><a href="/admin/dashboard.html">داشبورد</a></li>
                <li><a href="/admin/users.html">کاربران</a></li>
                <li><a href="/admin/activity.html">فعالیت و خطاها</a></li>
                <li><a href="/admin/channels.html">کانال‌ها</a></li>
                <li><a href="/admin/logs.html" class="active">لاگ‌ها</a></li>
                <li><a href="/admin/performance.html">عملکرد</a></li>
                <li><a href="/admin/settings.html">تنظیمات</a></li>
            </ul>
            <div class="user-info">
                <p id="currentUser">—</p>
                <button id="logoutBtn" class="btn btn-small btn-danger">خروج</button>
            </div>
        </nav>

        <main class="content">
            <div class="logs-header">
                <h1>لاگ‌های سیستم</h1>
                <div class="filter-row">
                    <select id="levelFilter" onchange="currentPage=1;loadLogs()">
                        <option value="">همه سطوح</option>
                        <option value="info">Info</option>
                        <option value="warning">Warning</option>
                        <option value="error">Error</option>
                    </select>
                    <input type="text" id="userIdFilter" placeholder="User ID…">
                    <button class="btn btn-secondary" onclick="currentPage=1;loadLogs()">فیلتر</button>
                    <button class="btn btn-secondary btn-small" onclick="currentPage=1;document.getElementById('levelFilter').value='';document.getElementById('userIdFilter').value='';loadLogs()">پاک</button>
                </div>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>زمان</th>
                        <th>سطح</th>
                        <th>User ID</th>
                        <th>Action</th>
                        <th>پیام</th>
                    </tr>
                </thead>
                <tbody id="logsTable">
                    <tr><td colspan="5" style="color:var(--text-3);padding:20px 16px;">در حال بارگذاری…</td></tr>
                </tbody>
            </table>

            <div class="pagination">
                <button class="btn btn-secondary btn-small" onclick="previousPage()">← قبلی</button>
                <span id="pageInfo">صفحه ۱</span>
                <button class="btn btn-secondary btn-small" onclick="nextPage()">بعدی →</button>
            </div>

            <div class="action-bar">
                <label>
                    <input type="checkbox" id="autoRefresh"> بروزرسانی خودکار هر ۵ ثانیه
                </label>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/admin/login.html';

        let currentPage = 1;
        const pageSize  = 50;
        let autoRefreshInterval = null;

        async function fetchAPI(endpoint) {
            const res = await fetch(endpoint, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 401) { localStorage.removeItem('token'); window.location.href = '/admin/login.html'; }
            return res.json();
        }

        async function loadLogs() {
            const level  = document.getElementById('levelFilter').value;
            const userId = document.getElementById('userIdFilter').value.trim();

            let endpoint = `/admin/logs?limit=${pageSize}&offset=${(currentPage - 1) * pageSize}`;
            if (level)  endpoint += `&level=${level}`;
            if (userId) endpoint += `&user_id=${encodeURIComponent(userId)}`;

            const tbody = document.getElementById('logsTable');
            tbody.innerHTML = `<tr><td colspan="5" style="color:var(--text-3);padding:20px 16px;">در حال بارگذاری…</td></tr>`;

            try {
                const data = await fetchAPI(endpoint);
                const badgeMap = { info: 'badge-info', warning: 'badge-warning', error: 'badge-danger' };
                tbody.innerHTML = (data.logs || []).map(log => `
                    <tr>
                        <td style="font-family:var(--font-mono);font-size:var(--f-xs);color:var(--text-3);white-space:nowrap;">
                            ${new Date(log.created_at).toLocaleString('fa-IR-u-ca-persian')}
                        </td>
                        <td><span class="badge ${badgeMap[log.level] || 'badge-info'}">${log.level}</span></td>
                        <td style="font-family:var(--font-mono);font-size:10px;color:var(--text-3);">${log.user_id || '—'}</td>
                        <td style="font-family:var(--font-mono);font-size:var(--f-xs);color:var(--accent);">${log.action || '—'}</td>
                        <td class="log-msg-cell" title="${(log.message||'').replace(/"/g,'&quot;')}">${log.message || '—'}</td>
                    </tr>`
                ).join('') || `<tr><td colspan="5" style="color:var(--text-3);padding:20px 16px;">لاگی یافت نشد</td></tr>`;

                document.getElementById('pageInfo').textContent =
                    `صفحه ${currentPage}  ·  ${data.total ?? ''} لاگ`;
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:var(--err-fg);padding:16px;">خطا: ${e.message}</td></tr>`;
            }
        }

        function previousPage() { if (currentPage > 1) { currentPage--; loadLogs(); } }
        function nextPage()     { currentPage++; loadLogs(); }

        document.getElementById('autoRefresh').addEventListener('change', (e) => {
            clearInterval(autoRefreshInterval);
            if (e.target.checked) autoRefreshInterval = setInterval(loadLogs, 5000);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/admin/login.html';
        });

        const payload = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('currentUser').textContent = payload.sub || 'Admin';
        loadLogs();
    </script>
</body>
</html>
