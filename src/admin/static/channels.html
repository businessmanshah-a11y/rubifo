<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubifo — Channels</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

        .channel-card {
            background: #1e293b;
            border: 1px solid #273549;
            border-radius: 12px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color .2s;
        }
        .channel-card:hover { border-color: #3b82f6; }

        .channel-header { display: flex; align-items: center; gap: 12px; }
        .channel-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff; font-weight: 700; flex-shrink: 0;
        }
        .channel-name { font-size: 15px; font-weight: 600; color: #f1f5f9; }
        .channel-id   { font-size: 11px; color: #64748b; font-family: monospace; }

        .channel-meta { display: flex; flex-wrap: wrap; gap: 6px; }
        .meta-chip {
            background: #0f172a; border: 1px solid #334155;
            border-radius: 6px; padding: 3px 8px; font-size: 11px; color: #94a3b8;
        }
        .meta-chip.source-type { background: #1e3a5f; color: #60a5fa; border-color: #1e3a5f; }
        .meta-chip.green { background: #064e3b; color: #6ee7b7; border-color: #064e3b; }
        .meta-chip.purple { background: #3b0764; color: #c084fc; border-color: #3b0764; }

        .channel-routes { font-size: 12px; color: #64748b; }
        .channel-routes span { color: #94a3b8; }

        /* Section heading */
        .section-header {
            display: flex; align-items: center; gap: 12px;
            margin: 28px 0 16px;
        }
        .section-header h2 { font-size: 16px; font-weight: 700; color: #f1f5f9; }
        .section-header .badge {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 20px; padding: 2px 10px; font-size: 12px; color: #64748b;
        }
        .divider { flex: 1; height: 1px; background: #1e293b; }

        .empty-state { text-align: center; padding: 48px; color: #475569; grid-column: 1/-1; }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

        .filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .filters input {
            background: #1e293b; border: 1px solid #334155; color: #f1f5f9;
            border-radius: 8px; padding: 8px 12px; font-size: 13px; min-width: 220px;
        }
        .filters input::placeholder { color: #475569; }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo"><h2>Rubifo</h2><p>Admin</p></div>
            <ul class="nav-menu">
                <li><a href="/admin/dashboard.html">Dashboard</a></li>
                <li><a href="/admin/users.html">Users</a></li>
                <li><a href="/admin/activity.html">Activity & Errors</a></li>
                <li><a href="/admin/channels.html" class="active">Channels</a></li>
                <li><a href="/admin/logs.html">Logs</a></li>
                <li><a href="/admin/performance.html">Performance</a></li>
                <li><a href="/admin/settings.html">Settings</a></li>
            </ul>
            <div class="user-info">
                <p id="currentUser">User</p>
                <button id="logoutBtn" class="btn btn-small btn-danger">Logout</button>
            </div>
        </nav>

        <main class="content">
            <div class="header">
                <h1>Channels</h1>
                <button class="btn btn-primary" onclick="loadChannels()">↻ Refresh</button>
            </div>

            <div class="filters">
                <input type="text" id="channelFilter" placeholder="Filter by name or ID…" oninput="applyFilter()">
            </div>

            <!-- Destinations (bot is admin) -->
            <div class="section-header">
                <h2>📍 Destination Channels</h2>
                <span class="badge" id="destCount">—</span>
                <div class="divider"></div>
                <span style="font-size:12px;color:#64748b">Bot is admin here</span>
            </div>
            <div class="channel-grid" id="destGrid">
                <div class="empty-state"><div class="icon">⏳</div>Loading…</div>
            </div>

            <!-- Sources (users forwarding FROM these) -->
            <div class="section-header">
                <h2>📦 Source Channels</h2>
                <span class="badge" id="srcCount">—</span>
                <div class="divider"></div>
                <span style="font-size:12px;color:#64748b">Users forward content from these</span>
            </div>
            <div class="channel-grid" id="srcGrid">
                <div class="empty-state"><div class="icon">⏳</div>Loading…</div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/admin/login.html';

        let allDestinations = [];
        let allSources = [];

        async function fetchAPI(endpoint, options = {}) {
            const res = await fetch(endpoint, {
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                ...options,
            });
            if (res.status === 401) { localStorage.removeItem('token'); window.location.href = '/admin/login.html'; }
            return res.json();
        }

        function initials(name) {
            if (!name) return '?';
            return name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase() || '?';
        }

        function renderDestCard(ch) {
            const name = ch.channel_name || ch.channel_id || 'Unknown';
            const id   = String(ch.channel_id || '');
            const cnt  = Number(ch.route_count ?? 0);
            const users = Number(ch.distinct_users ?? 0);
            const active = Number(ch.active_routes ?? 0);
            return `
                <div class="channel-card">
                    <div class="channel-header">
                        <div class="channel-avatar">${initials(name)}</div>
                        <div>
                            <div class="channel-name">${escHtml(name)}</div>
                            <div class="channel-id">${escHtml(id)}</div>
                        </div>
                    </div>
                    <div class="channel-meta">
                        <span class="meta-chip green">📍 Destination</span>
                        <span class="meta-chip">${active} active / ${cnt} total route${cnt !== 1 ? 's' : ''}</span>
                        <span class="meta-chip">${users} user${users !== 1 ? 's' : ''}</span>
                    </div>
                </div>`;
        }

        function renderSrcCard(ch) {
            const name    = ch.source_name || ('#' + ch.source_id) || 'Unknown';
            const id      = String(ch.source_id || '');
            const cnt     = Number(ch.route_count ?? 0);
            const postCnt = Number(ch.post_count ?? 0);
            const active  = ch.is_active ? '<span class="meta-chip green">Active</span>' : '<span class="meta-chip" style="color:#ef4444">Inactive</span>';
            return `
                <div class="channel-card">
                    <div class="channel-header">
                        <div class="channel-avatar" style="background:linear-gradient(135deg,#8b5cf6,#ec4899)">${initials(name)}</div>
                        <div>
                            <div class="channel-name">${escHtml(name)}</div>
                            <div class="channel-id">Source #${escHtml(id)}</div>
                        </div>
                    </div>
                    <div class="channel-meta">
                        <span class="meta-chip source-type">📦 Source</span>
                        ${active}
                        <span class="meta-chip">${cnt} route${cnt !== 1 ? 's' : ''}</span>
                        <span class="meta-chip purple">${postCnt} post${postCnt !== 1 ? 's' : ''}</span>
                    </div>
                </div>`;
        }

        function escHtml(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function renderGrid(gridId, items, renderer, emptyIcon, emptyText) {
            const grid = document.getElementById(gridId);
            if (!items || items.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">${emptyIcon}</div>${emptyText}</div>`;
                return;
            }
            grid.innerHTML = items.map(renderer).join('');
        }

        async function loadChannels() {
            document.getElementById('destGrid').innerHTML = '<div class="empty-state"><div class="icon">⏳</div>Loading…</div>';
            document.getElementById('srcGrid').innerHTML  = '<div class="empty-state"><div class="icon">⏳</div>Loading…</div>';

            try {
                const data = await fetchAPI('/admin/channels');
                allDestinations = data.destinations || [];
                allSources      = data.sources      || [];
                applyFilter();
            } catch (e) {
                document.getElementById('destGrid').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div>Failed to load: ${e.message}</div>`;
                document.getElementById('srcGrid').innerHTML  = `<div class="empty-state"><div class="icon">⚠️</div>Failed to load: ${e.message}</div>`;
            }
        }

        function applyFilter() {
            const q = (document.getElementById('channelFilter').value || '').toLowerCase();

            const filteredDest = allDestinations.filter(ch =>
                !q ||
                (ch.channel_name || '').toLowerCase().includes(q) ||
                (ch.channel_id   || '').toLowerCase().includes(q)
            );
            const filteredSrc = allSources.filter(ch =>
                !q ||
                (ch.source_name || '').toLowerCase().includes(q) ||
                String(ch.source_id || '').includes(q)
            );

            document.getElementById('destCount').textContent = filteredDest.length;
            document.getElementById('srcCount').textContent  = filteredSrc.length;

            renderGrid('destGrid', filteredDest, renderDestCard, '📭', 'No destination channels found');
            renderGrid('srcGrid',  filteredSrc,  renderSrcCard,  '📭', 'No source channels found');
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/admin/login.html';
        });

        const payload = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('currentUser').textContent = payload.sub || 'Admin';
        loadChannels();
    </script>
</body>
</html>
