<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubifo — Channels</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ── Channel card grid ── */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .channel-card {
            background: var(--surface);
            border: 1px solid var(--border-soft);
            border-radius: var(--r-lg);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: border-color 150ms ease, background 150ms ease;
            cursor: default;
        }
        .channel-card:hover { border-color: var(--border); background: var(--surface-2); }

        .channel-header { display: flex; align-items: center; gap: 12px; }

        .channel-avatar {
            width: 40px; height: 40px;
            border-radius: var(--r);
            background: var(--accent-subtle);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 800;
            color: var(--accent);
            font-family: var(--font-fa);
            flex-shrink: 0;
        }

        .channel-avatar.src-avatar {
            background: oklch(15% 0.04 248);
            border-color: oklch(25% 0.06 248);
            color: var(--inf-fg);
        }

        .channel-name { font-size: var(--f-sm); font-weight: 600; color: var(--text); line-height: 1.3; }
        .channel-id   { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); margin-top: 2px; }

        .channel-meta { display: flex; flex-wrap: wrap; gap: 6px; }

        .meta-chip {
            background: var(--surface-3);
            border: 1px solid var(--border-soft);
            border-radius: 100px;
            padding: 2px 9px;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-3);
        }

        .meta-chip.green  { background: var(--ok-bg);  color: var(--ok-fg);  border-color: var(--ok-bd); }
        .meta-chip.blue   { background: var(--inf-bg); color: var(--inf-fg); border-color: var(--inf-bd); }
        .meta-chip.accent { background: var(--accent-subtle); color: var(--accent); border-color: var(--border-soft); }
        .meta-chip.red    { background: var(--err-bg); color: var(--err-fg); border-color: var(--err-bd); }

        /* ── Section header ── */
        .section-header {
            display: flex; align-items: center; gap: 12px;
            margin: 28px 0 16px;
        }
        .section-header h2 { font-family: var(--font-fa); font-size: var(--f-lg); font-weight: 700; color: var(--text); }
        .section-header .count { background: var(--surface-2); border: 1px solid var(--border-soft); border-radius: 100px; padding: 1px 10px; font-size: var(--f-xs); color: var(--text-3); font-family: var(--font-mono); }
        .section-header .rule  { flex: 1; height: 1px; background: var(--border-soft); }
        .section-header .hint  { font-size: var(--f-xs); color: var(--text-3); }

        .filter-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .filter-row input { min-width: 260px; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-3); grid-column: 1/-1; }
        .empty-state .icon { font-size: 28px; margin-bottom: 8px; }
        .empty-state p { font-size: var(--f-sm); }
    </style>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo"><h2>Rubifo</h2><p>Admin</p></div>
            <ul class="nav-menu">
                <li><a href="/admin/dashboard.html">Dashboard</a></li>
                <li><a href="/admin/users.html">Users</a></li>
                <li><a href="/admin/activity.html">Activity & Errors</a></li>
                <li><a href="/admin/channels.html" class="active">Channels</a></li>
                <li><a href="/admin/logs.html">Logs</a></li>
                <li><a href="/admin/performance.html">Performance</a></li>
                <li><a href="/admin/settings.html">Settings</a></li>
            </ul>
            <div class="user-info">
                <p id="currentUser">—</p>
                <button id="logoutBtn" class="btn btn-small btn-danger">خروج</button>
            </div>
        </nav>

        <main class="content">
            <div class="header">
                <h1>کانال‌ها</h1>
                <button class="btn btn-secondary btn-small" onclick="loadChannels()">↻ بروزرسانی</button>
            </div>

            <div class="filter-row">
                <input type="text" id="channelFilter" placeholder="جستجو بر اساس نام یا ID…" oninput="applyFilter()">
            </div>

            <!-- Destinations -->
            <div class="section-header">
                <h2>📍 مقصدها</h2>
                <span class="count" id="destCount">—</span>
                <div class="rule"></div>
                <span class="hint">بات اینجا ادمین است</span>
            </div>
            <div class="channel-grid" id="destGrid">
                <div class="empty-state"><div class="icon">⏳</div><p>در حال بارگذاری…</p></div>
            </div>

            <!-- Sources -->
            <div class="section-header">
                <h2>📦 سورس‌ها</h2>
                <span class="count" id="srcCount">—</span>
                <div class="rule"></div>
                <span class="hint">محتوا از اینجا فوروارد می‌شود</span>
            </div>
            <div class="channel-grid" id="srcGrid">
                <div class="empty-state"><div class="icon">⏳</div><p>در حال بارگذاری…</p></div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/admin/login.html';

        let allDestinations = [];
        let allSources      = [];

        async function fetchAPI(endpoint, options = {}) {
            const res = await fetch(endpoint, {
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                ...options,
            });
            if (res.status === 401) { localStorage.removeItem('token'); window.location.href = '/admin/login.html'; }
            return res.json();
        }

        function initials(name) {
            if (!name) return '?';
            return name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase() || '?';
        }

        function esc(s) {
            return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function renderDestCard(ch) {
            const name   = ch.channel_name || ch.channel_id || 'کانال ناشناخته';
            const id     = String(ch.channel_id || '');
            const routes = Number(ch.route_count ?? 0);
            const active = Number(ch.active_routes ?? 0);
            const users  = Number(ch.distinct_users ?? 0);
            return `
                <div class="channel-card">
                    <div class="channel-header">
                        <div class="channel-avatar">${initials(name)}</div>
                        <div>
                            <div class="channel-name">${esc(name)}</div>
                            <div class="channel-id">${esc(id)}</div>
                        </div>
                    </div>
                    <div class="channel-meta">
                        <span class="meta-chip green">📍 مقصد</span>
                        <span class="meta-chip">${active} فعال / ${routes} مسیر</span>
                        <span class="meta-chip">${users} کاربر</span>
                    </div>
                </div>`;
        }

        function renderSrcCard(ch) {
            const name    = ch.source_name || ('#' + ch.source_id);
            const id      = String(ch.source_id || '');
            const routes  = Number(ch.route_count ?? 0);
            const posts   = Number(ch.post_count ?? 0);
            const active  = ch.is_active;
            return `
                <div class="channel-card">
                    <div class="channel-header">
                        <div class="channel-avatar src-avatar">${initials(name)}</div>
                        <div>
                            <div class="channel-name">${esc(name)}</div>
                            <div class="channel-id">Source #${esc(id)}</div>
                        </div>
                    </div>
                    <div class="channel-meta">
                        <span class="meta-chip blue">📦 سورس</span>
                        ${active ? '<span class="meta-chip green">فعال</span>' : '<span class="meta-chip red">غیرفعال</span>'}
                        <span class="meta-chip">${routes} مسیر</span>
                        <span class="meta-chip accent">${posts} پست</span>
                    </div>
                </div>`;
        }

        function renderGrid(gridId, items, renderer, emptyIcon, emptyText) {
            const grid = document.getElementById(gridId);
            if (!items || items.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">${emptyIcon}</div><p>${emptyText}</p></div>`;
                return;
            }
            grid.innerHTML = items.map(renderer).join('');
        }

        async function loadChannels() {
            document.getElementById('destGrid').innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>در حال بارگذاری…</p></div>';
            document.getElementById('srcGrid').innerHTML  = '<div class="empty-state"><div class="icon">⏳</div><p>در حال بارگذاری…</p></div>';
            try {
                const data = await fetchAPI('/admin/channels');
                allDestinations = data.destinations || [];
                allSources      = data.sources      || [];
                applyFilter();
            } catch (e) {
                const msg = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
                document.getElementById('destGrid').innerHTML = msg;
                document.getElementById('srcGrid').innerHTML  = msg;
            }
        }

        function applyFilter() {
            const q = (document.getElementById('channelFilter').value || '').toLowerCase();

            const filteredDest = allDestinations.filter(ch =>
                !q || (ch.channel_name || '').toLowerCase().includes(q) ||
                      String(ch.channel_id || '').toLowerCase().includes(q)
            );
            const filteredSrc = allSources.filter(ch =>
                !q || (ch.source_name || '').toLowerCase().includes(q) ||
                      String(ch.source_id || '').includes(q)
            );

            document.getElementById('destCount').textContent = filteredDest.length;
            document.getElementById('srcCount').textContent  = filteredSrc.length;

            renderGrid('destGrid', filteredDest, renderDestCard, '📭', 'مقصدی یافت نشد');
            renderGrid('srcGrid',  filteredSrc,  renderSrcCard,  '📭', 'سورسی یافت نشد');
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/admin/login.html';
        });

        const payload = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('currentUser').textContent = payload.sub || 'Admin';
        loadChannels();
    </script>
</body>
</html>
